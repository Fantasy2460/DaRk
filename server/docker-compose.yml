version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dark-journey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dark
      POSTGRES_PASSWORD: journey123
      POSTGRES_DB: dark_journey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dark -d dark_journey"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 可选：Redis（阶段二匹配队列、阶段三实时状态缓存用）
  # redis:
  #   image: redis:7-alpine
